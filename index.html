html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }

/* ============================================================
   PARS X — design tokens & base
   Black/charcoal dark mode · gold/amber accent · coral point
   Editorial contrast: Cormorant + Nanum Myeongjo display · Pretendard UI
   ============================================================ */

:root {
  /* surfaces — warm near-black */
  --bg:        #0A0908;
  --bg-2:      #0E0C0A;
  --surface:   #16130F;
  --surface-2: #201C16;
  --surface-3: #2A251D;
  --line:      rgba(243, 233, 214, 0.10);
  --line-2:    rgba(243, 233, 214, 0.16);
  --line-gold: rgba(242, 166, 35, 0.22);

  /* gold / amber — primary accent */
  --gold:      #F2A623;
  --gold-2:    #E9B967;
  --gold-3:    #FBD98C;
  --gold-deep: #B8791A;

  /* coral / pink — point only (female capacity, hearts) */
  --coral:      #FF6F86;
  --coral-soft: #FF93A4;
  --coral-dim:  rgba(255, 111, 134, 0.16);

  /* text — warm whites */
  --text:   #F4EEE3;
  --text-2: rgba(244, 238, 227, 0.66);
  --text-3: rgba(244, 238, 227, 0.42);
  --text-4: rgba(244, 238, 227, 0.26);

  /* type */
  --font-display: 'Cormorant Garamond', 'Nanum Myeongjo', serif;
  --font-myeongjo: 'Nanum Myeongjo', 'Cormorant Garamond', serif;
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

  --r-card: 22px;
  --r-lg: 28px;
  --r-pill: 999px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* ---- stage ---- */
html, body {
  margin: 0; height: 100%;
  background: #050403;
  font-family: var(--font-sans);
}
#stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(242,166,35,0.10), transparent 60%),
    radial-gradient(90% 70% at 50% 120%, rgba(255,111,134,0.05), transparent 55%),
    #050403;
  overflow: hidden;
}
#scaler { transform-origin: center center; }

/* ---- real-device mode: no bezel, fill the actual screen ---- */
html.is-device, html.is-device body { overflow: hidden; }
html.is-device #stage { background: var(--bg); padding: 0; }
html.is-device #scaler { transform: none !important; width: 100%; height: 100%; max-width: 560px; margin: 0 auto; }

/* ---- the app screen surface inside the device ---- */
.app {
  position: relative;
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* scroll regions: hide scrollbar */
.scroll { height: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.scroll::-webkit-scrollbar { width: 0; height: 0; }
.noscroll::-webkit-scrollbar { width: 0; }

/* ---- type helpers ---- */
.eyebrow {
  font-family: var(--font-sans);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold-2);
}
.eyebrow.dim { color: var(--text-3); }
.display {
  font-family: var(--font-display);
  font-weight: 500; line-height: 0.98;
  letter-spacing: -0.01em;
}
.serif-ko {
  font-family: var(--font-myeongjo);
  letter-spacing: -0.01em;
}
.num { font-family: var(--font-display); font-feature-settings: "tnum"; }

/* ---- buttons ---- */
.btn {
  font-family: var(--font-sans);
  font-weight: 600; font-size: 16px;
  border: none; border-radius: var(--r-pill);
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer; width: 100%; height: 56px;
  letter-spacing: -0.01em;
  transition: transform .14s ease, filter .2s ease, opacity .2s ease;
}
.btn:active { transform: scale(0.978); }
.btn-gold {
  background: linear-gradient(180deg, var(--gold-3), var(--gold) 55%, var(--gold-deep));
  color: #1A1206;
  box-shadow: 0 1px 0 rgba(255,255,255,0.35) inset, 0 10px 30px -10px rgba(242,166,35,0.55);
}
.btn-gold:disabled { filter: grayscale(0.7) brightness(0.55); cursor: default; box-shadow: none; }
.btn-ghost {
  background: rgba(244,238,227,0.05);
  color: var(--text);
  border: 1px solid var(--line-2);
}
.btn-outline-gold {
  background: transparent; color: var(--gold-2);
  border: 1px solid var(--line-gold);
}

/* ---- chips ---- */
.chip {
  font-family: var(--font-sans);
  font-size: 13.5px; font-weight: 500;
  padding: 9px 15px; border-radius: var(--r-pill);
  background: rgba(244,238,227,0.04);
  border: 1px solid var(--line);
  color: var(--text-2);
  cursor: pointer; user-select: none;
  transition: all .16s ease;
  letter-spacing: -0.01em;
}
.chip.on {
  background: rgba(242,166,35,0.12);
  border-color: var(--line-gold);
  color: var(--gold-3);
}

/* ---- capacity badge ---- */
.badge-cap {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 600;
  padding: 5px 10px; border-radius: var(--r-pill);
  backdrop-filter: blur(8px);
  letter-spacing: 0;
}
.badge-male {
  background: rgba(12,14,20,0.55);
  border: 1px solid rgba(160,190,255,0.28);
  color: #BFD2FF;
}
.badge-female {
  background: rgba(40,12,18,0.5);
  border: 1px solid rgba(255,111,134,0.42);
  color: var(--coral-soft);
}
.badge-cap .n { font-family: var(--font-display); font-size: 15px; font-weight: 600; line-height: 1; }

/* ---- divider ---- */
.rule { height: 1px; background: var(--line); border: 0; margin: 0; }

/* ---- soft entrance ---- */
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
.fade-up { animation: fadeUp .5s cubic-bezier(0.22, 1, 0.36, 1) both; }

/* ---- screen transition ---- */
.screen-enter { animation: scEnter .34s cubic-bezier(0.22, 1, 0.36, 1) both; }
@keyframes scEnter { from { opacity: 0; transform: translateX(22px); } to { opacity: 1; transform: none; } }
.screen-enter-back { animation: scEnterBack .34s cubic-bezier(0.22, 1, 0.36, 1) both; }
@keyframes scEnterBack { from { opacity: 0; transform: translateX(-22px); } to { opacity: 1; transform: none; } }

/* ---- PARS X v2: daily picks / match / badges / live mode ---- */
@keyframes popIn { 0% { opacity: 0; transform: scale(0.82); } 60% { transform: scale(1.04); } 100% { opacity: 1; transform: scale(1); } }
.pop-in { animation: popIn .5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
@keyframes matchGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(242,166,35,0.0), 0 30px 80px -20px rgba(0,0,0,0.8); }
  50% { box-shadow: 0 0 60px -6px rgba(242,166,35,0.35), 0 30px 80px -20px rgba(0,0,0,0.8); }
}
@keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
@keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
.shimmer-text {
  background: linear-gradient(100deg, var(--gold-2) 20%, #FFF3D8 40%, var(--gold-2) 60%);
  background-size: 200% auto;
  -webkit-background-clip: text; background-clip: text; color: transparent;
  animation: shimmer 2.8s linear infinite;
}
@keyframes cardReveal {
  0% { transform: rotateY(90deg) scale(0.9); opacity: 0; }
  100% { transform: rotateY(0deg) scale(1); opacity: 1; }
}
.card-reveal { animation: cardReveal .6s cubic-bezier(0.22, 1, 0.36, 1) both; }
@keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
.pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }
@keyframes swipeOutL { to { opacity: 0; transform: translateX(-70px) rotate(-4deg); } }
@keyframes swipeOutR { to { opacity: 0; transform: translateX(70px) rotate(4deg); } }
.swipe-out-l { animation: swipeOutL .34s ease both; }
.swipe-out-r { animation: swipeOutR .34s ease both; }
@keyframes riseFade { from { opacity: 0; transform: translateY(26px) scale(0.96); } to { opacity: 1; transform: none; } }
.rise-fade { animation: riseFade .55s cubic-bezier(0.22, 1, 0.36, 1) both; }
@keyframes confettiFall {
  0% { transform: translateY(-16px) rotate(0deg); opacity: 0; }
  12% { opacity: 1; }
  100% { transform: translateY(560px) rotate(340deg); opacity: 0; }
}

.badge-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.01em;
  padding: 4px 9px; border-radius: 999px;
  background: rgba(242,166,35,0.10);
  border: 1px solid var(--line-gold);
  color: var(--gold-2);
  white-space: nowrap;
}
.badge-pill.dim {
  background: rgba(244,238,227,0.04);
  border-color: var(--line);
  color: var(--text-3);
}

/* ---- tab bar ---- */
.tabbar {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 10px 26px calc(env(safe-area-inset-bottom, 0px) + 30px);
  display: flex; justify-content: space-around; align-items: center;
  background: linear-gradient(180deg, rgba(10,9,8,0) 0%, rgba(10,9,8,0.86) 32%, var(--bg) 70%);
  backdrop-filter: blur(10px);
  z-index: 40;
}
.tab { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 14px; }
.tab span { font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em; color: var(--text-4); }
.tab.on span { color: var(--gold-2); }
.tab svg { width: 23px; height: 23px; display: block; }

input, textarea, button { font-family: inherit; }
